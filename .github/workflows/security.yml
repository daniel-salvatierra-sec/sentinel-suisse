name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --verbose

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        # Pin ruff to match .pre-commit-config.yaml (astral-sh/ruff-pre-commit v0.8.4).
        run: pip install "ruff==0.8.4" "bandit==1.8.0"

      - name: Run ruff
        run: ruff check src

      - name: Run bandit
        run: bandit -c pyproject.toml -r src
